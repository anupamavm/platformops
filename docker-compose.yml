services:
  # --------------------------
  # PostgreSQL for all services
  # --------------------------
  postgres:
    image: postgres:15.7-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: platformops
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - platformops-net

  db-migrator:
    build:
      context: ./db-migrator
    container_name: db-migrator
    depends_on:
      - postgres
    networks:
      - platformops-net

  # --------------------------
  # Kafka + Zookeeper
  # --------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - platformops-net

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - zookeeper
    networks:
      - platformops-net

  # --------------------------
  # User Service
  # --------------------------
  user-service:
    build:
      context: ./services/user-service
    container_name: user-service
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/platformops
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - postgres
      - kafka
    networks:
      - platformops-net

  # --------------------------
  # Order Service
  # --------------------------
  order-service:
    build:
      context: ./services/order-service
    container_name: order-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/platformops
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - postgres
      - kafka
    networks:
      - platformops-net

  # --------------------------
  # Risk Service
  # --------------------------
  risk-service:
    build:
      context: ./services/risk-service
    container_name: risk-service
    ports:
      - "8001:8001"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: payments
      SERVICE_PORT: 8001
    depends_on:
      - kafka
    networks:
      - platformops-net

  # --------------------------
  # API Gateway
  # --------------------------
  api-gateway:
    build:
      context: ./services/api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      USER_SERVICE_URL: http://user-service:8080
      ORDER_SERVICE_URL: http://order-service:8080
      RISK_SERVICE_URL: http://risk-service:8001
      AI_SERVICE_URL: http://ai-service:8000
      USER_SERVICE_JWT_URL: http://user-service:8080
    depends_on:
      - user-service
      - order-service
      - risk-service
    networks:
      - platformops-net

volumes:
  pgdata:

networks:
  platformops-net:
    driver: bridge
